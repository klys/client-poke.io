name: Build and Deploy

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22' # Adjust to match your project's target Node version
          cache: 'npm'

      - name: Overwrite config.json
        run: echo '${{ secrets.CONFIG_ENV }}' > public/config.json

      - name: Install dependencies
        run: npm ci # If you use Yarn, change this to: yarn install --frozen-lockfile

      - name: Build the app
        run: npm run build # If you use Yarn, change this to: yarn build

      - name: Deploy to pokecraft_frontend
        uses: peaceiris/actions-gh-pages@v4
        with:
          deploy_key: ${{ secrets.DEPLOY_TOKEN }}
          external_repository: klys/pokecraft_frontend
          publish_branch: master
          publish_dir: ./build
          keep_files: true
          cname: pokecraft.klys.dev
