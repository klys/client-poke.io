name: Build, Deploy, and Release

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

env:
  NODE_VERSION: '22'
  MOBILE_REPOSITORY: ${{ vars.MOBILE_REPOSITORY || 'klys/pokecraft-mobile' }}
  MOBILE_REPOSITORY_REF: ${{ vars.MOBILE_REPOSITORY_REF || 'master' }}
  DESKTOP_REPOSITORY: ${{ vars.DESKTOP_REPOSITORY || 'klys/pokecraft-desktop' }}
  DESKTOP_REPOSITORY_REF: ${{ vars.DESKTOP_REPOSITORY_REF || 'master' }}

jobs:
  build-and-deploy:
    name: Build and deploy web client
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Overwrite config.json
        run: echo '${{ secrets.CONFIG_ENV }}' > public/config.json

      - name: Install dependencies
        run: npm ci

      - name: Build the app
        run: npm run build

      - name: Deploy to pokecraft_frontend
        uses: peaceiris/actions-gh-pages@v4
        with:
          deploy_key: ${{ secrets.DEPLOY_TOKEN }}
          external_repository: klys/pokecraft_frontend
          publish_branch: master
          publish_dir: ./build
          keep_files: true
          cname: pokecraft.klys.dev

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout web client
        uses: actions/checkout@v6

      - name: Checkout Android wrapper
        uses: actions/checkout@v6
        with:
          repository: ${{ env.MOBILE_REPOSITORY }}
          ref: ${{ env.MOBILE_REPOSITORY_REF }}
          path: native/mobile
          token: ${{ secrets.NATIVE_REPO_TOKEN || github.token }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            package-lock.json
            native/mobile/package-lock.json

      - name: Setup JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Install Android wrapper dependencies
        working-directory: native/mobile
        run: npm ci

      - name: Build web client into Android wrapper
        working-directory: native/mobile
        env:
          WEB_SRC: ${{ github.workspace }}
          CONFIG_JSON: ${{ secrets.MOBILE_CONFIG_JSON }}
          BACKEND_URL: ${{ secrets.MOBILE_BACKEND_URL || vars.MOBILE_BACKEND_URL || secrets.BACKEND_URL || vars.BACKEND_URL || 'https://venova-alpha-backend.adventurex.games' }}
          ASSET_STORAGE_BASE_URL: ${{ secrets.MOBILE_ASSET_STORAGE_BASE_URL || vars.MOBILE_ASSET_STORAGE_BASE_URL || secrets.ASSET_STORAGE_BASE_URL || vars.ASSET_STORAGE_BASE_URL || 'https://venova-2022-assets.adventurex.games' }}
        run: npm run build:web

      - name: Sync Capacitor Android project
        working-directory: native/mobile
        run: npx cap sync android

      - name: Build debug APK
        working-directory: native/mobile/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace

      - name: Package APK
        id: package
        shell: bash
        run: |
          VERSION="$(node -p "require('./native/mobile/package.json').version")"
          SHORT_SHA="${GITHUB_SHA::7}"
          APK_NAME="PokeCraft-Android-debug-v${VERSION}-${SHORT_SHA}.apk"
          APK_PATH="release-assets/${APK_NAME}"

          mkdir -p release-assets
          cp native/mobile/android/app/build/outputs/apk/debug/app-debug.apk "$APK_PATH"

          echo "apk_path=$APK_PATH" >> "$GITHUB_OUTPUT"

      - name: Upload Android release asset
        uses: actions/upload-artifact@v7
        with:
          name: release-android
          path: ${{ steps.package.outputs.apk_path }}
          if-no-files-found: error
          compression-level: 0

  build-desktop:
    name: Build desktop (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            os: ubuntu-latest
            builder_flag: --linux
            artifact_name: release-desktop-linux
            artifact_paths: |
              native/desktop/release/*.AppImage
              native/desktop/release/*.deb
          - platform: windows
            os: windows-latest
            builder_flag: --win
            artifact_name: release-desktop-windows
            artifact_paths: native/desktop/release/*.exe
          - platform: macos
            os: macos-latest
            builder_flag: --mac
            artifact_name: release-desktop-macos
            artifact_paths: |
              native/desktop/release/*.dmg
              native/desktop/release/*.zip

    steps:
      - name: Checkout web client
        uses: actions/checkout@v6

      - name: Checkout desktop wrapper
        uses: actions/checkout@v6
        with:
          repository: ${{ env.DESKTOP_REPOSITORY }}
          ref: ${{ env.DESKTOP_REPOSITORY_REF }}
          path: native/desktop
          token: ${{ secrets.NATIVE_REPO_TOKEN || github.token }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            package-lock.json
            native/desktop/package-lock.json

      - name: Install desktop wrapper dependencies
        working-directory: native/desktop
        run: npm ci

      - name: Build web client into desktop wrapper
        working-directory: native/desktop
        shell: bash
        env:
          WEB_SRC: ${{ github.workspace }}
          CONFIG_JSON: ${{ secrets.DESKTOP_CONFIG_JSON }}
          BACKEND_URL: ${{ secrets.DESKTOP_BACKEND_URL || vars.DESKTOP_BACKEND_URL || secrets.BACKEND_URL || vars.BACKEND_URL || 'https://venova-alpha-backend.adventurex.games' }}
          ASSET_STORAGE_BASE_URL: ${{ secrets.DESKTOP_ASSET_STORAGE_BASE_URL || vars.DESKTOP_ASSET_STORAGE_BASE_URL || secrets.ASSET_STORAGE_BASE_URL || vars.ASSET_STORAGE_BASE_URL || 'https://venova-2022-assets.adventurex.games' }}
        run: npm run build:web

      - name: Build desktop installers
        working-directory: native/desktop
        shell: bash
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          GH_TOKEN: ${{ github.token }}
        run: npx electron-builder ${{ matrix.builder_flag }} --publish never

      - name: Upload desktop release assets
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_paths }}
          if-no-files-found: error
          compression-level: 0

  publish-release:
    name: Publish native app release
    needs:
      - build-android
      - build-desktop
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v6

      - name: Download native release assets
        uses: actions/download-artifact@v8
        with:
          pattern: release-*
          path: release-assets
          merge-multiple: true

      - name: Prepare release metadata
        id: release
        shell: bash
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          SHORT_SHA="${GITHUB_SHA::7}"
          TAG="native-v${VERSION}-${GITHUB_RUN_NUMBER}-${GITHUB_RUN_ATTEMPT}"

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "title=PokeCraft Native v${VERSION} (${SHORT_SHA})" >> "$GITHUB_OUTPUT"

      - name: Publish assets on client-poke.io release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          RELEASE_TITLE: ${{ steps.release.outputs.title }}
        run: |
          mapfile -d '' ASSETS < <(find release-assets -maxdepth 1 -type f -print0)

          if [ "${#ASSETS[@]}" -eq 0 ]; then
            echo "No native release assets were downloaded." >&2
            exit 1
          fi

          gh release create "$RELEASE_TAG" "${ASSETS[@]}" \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "$RELEASE_TITLE" \
            --notes "Debug-signed Android APK and unsigned desktop builds generated from client-poke.io commit ${GITHUB_SHA}." \
            --prerelease
